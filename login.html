<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول - معادلة</title>
    <style>
        body { font-family: Arial; background: #f0f4ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #1a237e; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #3949ab; }
        a { display: block; text-align: center; margin-top: 15px; color: #1a237e; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 تسجيل الدخول</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="الإيميل" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <button type="submit">دخول</button>
        </form>
        <a href="/register">مش عندك حساب؟ سجل يلااا دلوقتي</a>
    </div>
</body>
</html>
