<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل حساب - معادلة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #1a237e, #3949ab); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 420px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: #1a237e; text-align: center; margin-bottom: 25px; font-size: 26px; }
        input { width: 100%; padding: 13px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: 0.3s; outline: none; }
        input:focus { border-color: #1a237e; }
        .admin-code { border: 2px dashed #ffd700; background: #fffde7; }
        .admin-code::placeholder { color: #f9a825; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a237e, #3949ab); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(26,35,126,0.4); }
        a { display: block; text-align: center; margin-top: 15px; color: #1a237e; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .hint { text-align: center; color: #999; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎓 إنشاء حساب جديد</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="الاسم الكامل" required>
            <input type="email" name="email" placeholder="الإيميل" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <input type="text" name="admin_code" placeholder="🔑 كود سر هااا الأدمين (اختياري)" class="admin-code">
            <p class="hint">اتركه فاضي لو طالب عادي</p>
            <button type="submit">إنشاء الحساب</button>
        </form>
        <a href="/login">عندك حساب؟ سجل دخول</a>
    </div>
</body>
</html>
